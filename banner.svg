<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="40" x2="1280" y2="40" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="120" x2="1280" y2="120" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="200" x2="1280" y2="200" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="280" x2="1280" y2="280" stroke="#6366f1" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="320" stroke="#6366f1" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="320" stroke="#6366f1" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="320" stroke="#6366f1" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="320" stroke="#6366f1" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="320" stroke="#6366f1" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="320" stroke="#6366f1" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="320" stroke="#6366f1" stroke-width="1"/>
  </g>
  
  <!-- Floating code symbols -->
  <g opacity="0.15" fill="#8b5cf6">
    <text x="100" y="80" font-family="monospace" font-size="24">{ }</text>
    <text x="300" y="120" font-family="monospace" font-size="18">const</text>
    <text x="500" y="60" font-family="monospace" font-size="20">&lt;/&gt;</text>
    <text x="900" y="90" font-family="monospace" font-size="22">()</text>
    <text x="1100" y="70" font-family="monospace" font-size="18">=&gt;</text>
    <text x="200" y="260" font-family="monospace" font-size="16">import</text>
    <text x="700" y="270" font-family="monospace" font-size="20">export</text>
    <text x="1000" y="250" font-family="monospace" font-size="18">async</text>
  </g>
  
  <!-- Accent bar top -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>
  
  <!-- Accent bar bottom -->
  <rect x="0" y="316" width="1280" height="4" fill="url(#accent)"/>
  
  <!-- Main text -->
  <text x="640" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff">
    WILLIAM PEREIRA DA CONCEIÇÃO
  </text>
  
  <!-- Gradient underline -->
  <rect x="340" y="145" width="600" height="3" rx="2" fill="url(#accent)"/>
  
  <!-- Subtitle -->
  <text x="640" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8">
    Desenvolvedor Full Stack | React • Node.js • React Native
  </text>
  
  <!-- Skills badges -->
  <g transform="translate(360, 220)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#6366f1" opacity="0.3"/>
    <text x="40" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a5b4fc">React</text>
    
    <rect x="95" y="0" width="80" height="28" rx="14" fill="#8b5cf6" opacity="0.3"/>
    <text x="135" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a5b4fc">Node.js</text>
    
    <rect x="190" y="0" width="100" height="28" rx="14" fill="#6366f1" opacity="0.3"/>
    <text x="240" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a5b4fc">React Native</text>
    
    <rect x="305" y="0" width="80" height="28" rx="14" fill="#8b5cf6" opacity="0.3"/>
    <text x="345" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a5b4fc">TypeScript</text>
    
    <rect x="400" y="0" width="60" height="28" rx="14" fill="#6366f1" opacity="0.3"/>
    <text x="430" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a5b4fc">Git</text>
    
    <rect x="475" y="0" width="80" height="28" rx="14" fill="#8b5cf6" opacity="0.3"/>
    <text x="515" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a5b4fc">PostgreSQL</text>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="80" cy="280" r="60" fill="#6366f1" opacity="0.05"/>
  <circle cx="1200" cy="60" r="80" fill="#8b5cf6" opacity="0.05"/>
  <circle cx="1250" cy="280" r="50" fill="#6366f1" opacity="0.08"/>
</svg>